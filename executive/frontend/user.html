<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8">
	<title>Customer Dashboard</title>

	<link rel="stylesheet" href="css/index.css">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

	<!-- HEADER -->
	<header class="main-header">

		<div class="header-top">
			<div class="brand">
				<span class="brand-name">ระบบเช่าอุปกรณ์กีฬา</span>
				<small>Sports Equipment Rental System</small>
			</div>

			<div class="staff-zone">
				<a href="login.html" class="profile-btn">ออกจากระบบ</a>
			</div>
		</div>

		<div class="header-bottom">
			<nav class="main-nav">
				<a href="index.html" class="nav-item">ภาพรวม</a>
				<a href="user.html" class="nav-item active">ผู้ใช้</a>
				<a href="equipment_dashboard.html" class="nav-item">อุปกรณ์</a>
			</nav>
		</div>

	</header>

	<div class="container">

		<!-- SIDEBAR -->
		<aside class="sidebar">

			<h3>ตัวกรองข้อมูล</h3>

			<label>ช่วงเวลา</label>
			<select id="rangeSelect">
				<option value="" selected>ทั้งหมด</option>
				<option value="7days">7 วัน</option>
				<option value="30days">30 วัน</option>
				<option value="1year">1 ปี</option>
				<option value="custom">กำหนดเอง</option>
			</select>

			<div id="customDateBox" class="custom-date" style="display:none;">
				<input type="date" id="startDate">
				<input type="date" id="endDate">
			</div>

			<label>ภูมิภาค</label>
			<select id="regionSelect">
				<option value="">ทั้งหมด</option>
			</select>

			<label>จังหวัด</label>
			<select id="provinceSelect">
				<option value="">ทั้งหมด</option>
			</select>

			<label>สาขา</label>
			<select id="branchSelect">
				<option value="">ทั้งหมด</option>
			</select>

			<button id="resetFilter" class="btn-reset">รีเซ็ตตัวกรอง</button>

		</aside>


		<!-- MAIN -->
		<main class="main">

			<!-- KPI -->
			<section class="kpi-grid">

				<div class="kpi-card">
					<div class="kpi-title">จำนวนลูกค้า</div>
					<div class="kpi-value" id="kpiBookings">-</div>
				</div>

				<div class="kpi-card">
					<div class="kpi-title">อัตราการกลับมาใช้ซ้ำ</div>
					<div class="kpi-value" id="kpiRevenue">-</div>
				</div>

				<div class="kpi-card">
					<div class="kpi-title">รายได้เฉลี่ยต่อคน</div>
					<div class="kpi-value" id="kpiCancel">-</div>
				</div>

				<div class="kpi-card">
					<div class="kpi-title">จำนวนการจองต่อคน</div>
					<div class="kpi-value" id="kpiAvg">-</div>
				</div>

			</section>


			<!-- TREND -->
			<section class="grid-2">

				<div class="card">
					<h3>ลูกค้าใหม่ vs ลูกค้าเดิม</h3>
					<canvas id="bookingTrendChart"></canvas>
				</div>

				<div class="card">
					<h3>จำนวนการใช้งานต่อคน</h3>
					<canvas id="revenueTrendChart"></canvas>
				</div>

			</section>


			<!-- TYPE + CANCEL -->
			<section class="grid-2">

				<div class="card">
					<h3>รายได้ตามประเภทลูกค้า</h3>
					<canvas id="channelChart"></canvas>
				</div>

				<div class="card">
					<h3>อัตราการยกเลิกตามประเภทลูกค้า</h3>
					<canvas id="bookingRatioChart"></canvas>
				</div>

			</section>


			<!-- BRANCH -->
			<section class="card">
				<h3>การใช้งานตามสาขา</h3>
				<canvas id="topChart"></canvas>
			</section>

		</main>

	</div>

	<!-- 🔥 ใช้ defer กัน script รันเร็วเกิน -->
	<script src="user.js" defer></script>

</body>
</html>
