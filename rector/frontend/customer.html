<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8">
	<title>Rector Dashboard</title>

	<link rel="stylesheet" href="css/customer.css">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
	<header class="main-header">

		<div class="header-top">

			<div class="brand">
				<span class="brand-name">ระบบเช่าอุปกรณ์กีฬา</span>
				<small>Sports Equipment Rental System</small>
			</div>

			<div class="staff-zone">
				<a href="profile.html" class="profile-btn">👤 โปรไฟล์</a>
			</div>

		</div>

		<div class="header-bottom">
			<nav class="main-nav">
				<a href="index.html" class="nav-item">ภาพรวม</a>
                <a href="customer.html" class="nav-item active">ลูกค้า</a>
                <a href="equipment.html" class="nav-item">อุปกรณ์</a>
			</nav>
		</div>
	</header>

	<div class="container">

		<!-- ================= SIDEBAR FILTER ================= -->
		<aside class="sidebar">
			<h3>ตัวกรองข้อมูล</h3>

			<label>ช่วงเวลา</label>
			<select id="rangeSelect">
				<option value="all" selected>ทั้งหมด</option>
				<option value="7days">7 วันล่าสุด</option>
				<option value="30days">30 วันล่าสุด</option>
				<option value="1year">1 ปีล่าสุด</option>
				<option value="custom">กำหนดเอง</option>
			</select>

			<div id="customDateBox" class="custom-date" style="display:none;">
				<input type="date" id="startDate">
				<input type="date" id="endDate">
			</div>

			<label>ประเภทลูกค้า</label>
			<select id="userTypeSelect">
				<option value="">ทั้งหมด</option>
				<option value="student">นิสิต/นักศึกษา</option>
				<option value="general">บุคคลทั่วไป</option>
				<option value="external">บุคคลภายนอก</option>
			</select>

			<label>คณะ</label>
			<select id="facultySelect">
				<option value="">ทุกคณะ</option>
			</select>

			<label>ชั้นปี</label>
			<select id="yearSelect">
			</select>

			<label>รูปแบบการเช่า</label>
			<select id="bookingTypeSelect">
				<option value="">ทั้งหมด</option>
				<option value="online">Online</option>
				<option value="walkin">Walk-in</option>
			</select>

			<button id="resetFilter" class="btn-reset">รีเซ็ตตัวกรอง</button>
		</aside>

		<main class="main">

			<section class="kpi-grid">
				<div class="kpi-card">
					<div class="kpi-title">ผู้ใช้งานทั้งหมด</div>
					<div class="kpi-value" id="kpiUsers">0</div>
					<div class="kpi-unit">คน</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-title">นิสิต</div>
					<div class="kpi-value" id="kpiPenetration">0%</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-title">บุคคลทั่วไป</div>
					<div class="kpi-value" id="kpiGeneral">0%</div>
				</div>
				<div class="kpi-card">
					<div class="kpi-title">บุคคลภายนอก</div>
					<div class="kpi-value" id="kpiExternal">0%</div>
				</div>
			</section>

			<section class="card">
				<div class="card-header">
					<h3>แนวโน้มผู้ใช้รายเดือน</h3>
				</div>
				<div class="chart-container">
					<canvas id="trendUsersChart"></canvas>
				</div>
			</section>

			<div class="grid-2">
				<section class="card">
					<div class="card-header">
						<h3>ผู้ใช้แยกตามชั้นปี</h3>
					</div>
					<div class="chart-container">
						<canvas id="yearChart"></canvas>
					</div>
				</section>

				<section class="card">
					<div class="card-header">
						<h3>สัดส่วนเพศผู้ใช้งาน</h3>
					</div>
					<div class="chart-container" style="display: flex; justify-content: center; align-items: center;">
						<canvas id="genderChart"></canvas>
					</div>
				</section>
			</div>

			<section class="card">
				<div class="card-header">
					<h3>Top 5 Faculty</h3>
				</div>
				<div class="chart-container" style="height: 350px;">
					<canvas id="topFacultyChart"></canvas>
				</div>
			</section>

		</main>
	</div>

	<script src="customer.js"></script>
</body>

</html>
